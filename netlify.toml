[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

# Redirect all /api/* requests to the backend URL
# When VITE_API_URL is configured in environment variables,
# the frontend will use that instead of relative paths
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Cache policy for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
